<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEasy - Online Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    padding:15px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.hero{
    height:450px;
    background:linear-gradient(to right,#4f46e5,#06b6d4);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:52px;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
    margin-bottom:20px;
}

.btn{
    background:white;
    color:#111;
    padding:12px 25px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

.section-title{
    text-align:center;
    margin:50px 0 20px;
    font-size:34px;
}

.products{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-bottom:60px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-body{
    padding:15px;
}

.card h3{
    margin-bottom:10px;
}

.price{
    color:#4f46e5;
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

.buy-btn{
    width:100%;
    background:#4f46e5;
    color:white;
    border:none;
    padding:12px;
    border-radius:6px;
    cursor:pointer;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<header>
    <div class="logo">ShopEasy</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Categories</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Big Sale 2026</h1>
    <p>Latest Electronics & Accessories at Best Prices</p>
    <a href="#products" class="btn">Shop Now</a>
</section>

<h2 class="section-title" id="products">Featured Products</h2>

<section class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800" alt="">
        <div class="card-body">
            <h3>Smartphone Pro</h3>
            <div class="price">₹29,999</div>
            <button class="buy-btn">Add To Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800" alt="">
        <div class="card-body">
            <h3>Wireless Headphones</h3>
            <div class="price">₹3,999</div>
            <button class="buy-btn">Add To Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800" alt="">
        <div class="card-body">
            <h3>Smart Watch</h3>
            <div class="price">₹5,999</div>
            <button class="buy-btn">Add To Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800" alt="">
        <div class="card-body">
            <h3>Running Shoes</h3>
            <div class="price">₹2,499</div>
            <button class="buy-btn">Add To Cart</button>
        </div>
    </div>

</section>

<footer>
    © 2026 ShopEasy. All Rights Reserved.
</footer>

</body>
</html>
